<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&amp;family=Urbanist:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- Light cream background -->
  <rect width="1200" height="400" fill="#FDF6F0"/>

  <!-- Mark: centred vertically, left-aligned with padding -->
  <g transform="translate(100, 50) scale(3)">
    <rect width="100" height="100" rx="22" fill="#2a1208"/>
    <rect x="18" y="22" width="64" height="7" rx="3.5" fill="#FDF6F0"/>
    <rect x="18" y="22" width="8" height="58" rx="4" fill="#FDF6F0"/>
    <path d="M26 29 C42 29 56 34 56 46 C56 58 42 62 26 62" fill="none" stroke="#FDF6F0" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 57 L64 82" fill="none" stroke="#FDF6F0" stroke-width="8" stroke-linecap="round"/>
    <circle cx="72" cy="26" r="6" fill="#E8960C"/>
  </g>

  <!-- Wordmark -->
  <!-- "Rishtey" — italic serif -->
  <text
    x="470"
    y="230"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="500"
    font-size="148"
    fill="#3D1F14"
    dominant-baseline="middle"
    text-anchor="start"
    letter-spacing="2"
  >Rishtey</text>

  <!-- "Matchmaking" — small uppercase sans -->
  <text
    x="476"
    y="316"
    font-family="'Urbanist', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="26"
    fill="#DC6B52"
    dominant-baseline="middle"
    text-anchor="start"
    letter-spacing="10"
  >MATCHMAKING</text>
</svg>
